# This file IS the pipeline. GitHub reads any .yml file inside
# .github/workflows/ and runs it on its own servers (GitHub Actions).

name: Deploy Catalyst functions

# WHEN to run: every push to main that touches the backend.
# Edits to blog/HTML files won't trigger a function deploy.
on:
  push:
    branches: [main]
    paths:
      - "catalyst-backend/**"
  workflow_dispatch: # also adds a manual "Run workflow" button in the Actions tab

jobs:
  # ── Stage 1: automated tests ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # download the repo onto the runner
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # same Node version as the Catalyst stack

      - name: Check formSubmit
        working-directory: catalyst-backend/functions/formSubmit
        run: |
          npm ci
          node --check index.js

      - name: Check billOcr
        working-directory: catalyst-backend/functions/billOcr
        run: |
          npm ci
          node --check index.js

      - name: Check crmSync
        working-directory: catalyst-backend/functions/crmSync
        run: |
          npm ci
          node --check index.js

  # ── Stage 2: deploy to the Development environment ────────
  # Runs ONLY if the test job above passed ("needs: test").
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Catalyst CLI
        run: npm install -g zcatalyst-cli

      # CI checks out WITHOUT node_modules (gitignored). Catalyst packages each
      # function's local node_modules on deploy, so install them first or the
      # functions ship without their dependencies and crash at runtime.
      - name: Install function dependencies
        working-directory: catalyst-backend
        run: |
          for d in functions/*/; do
            if [ -f "${d}package.json" ]; then
              echo "Installing deps for ${d}"
              (cd "$d" && npm ci --omit=dev)
            fi
          done

      - name: Deploy to Catalyst (Development env)
        working-directory: catalyst-backend
        env:
          # Secret token you store in GitHub — never written in this file
          CATALYST_TOKEN: ${{ secrets.CATALYST_TOKEN }}
        run: |
          set -o pipefail
          # --org / --project give CI the context a logged-in laptop has locally;
          # -ni fails (instead of silently prompting) when anything is missing.
          catalyst deploy \
            --org 110003037934 \
            --project 1258000000014001 \
            -ni 2>&1 | tee deploy.log
          # Backstop: this CLI has exited 0 even on failure (that caused earlier
          # false-green runs). Its error glyph is ✖ — treat any ✖ as a failure.
          if grep -q "✖" deploy.log; then
            echo "::error::Catalyst deploy reported an error (see log above)"
            exit 1
          fi
