  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

u<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"trio\">\n      <section class=\"tcard\" id=\"p3\">\n        <div class=\"pviz\" style=\"background:var(--green-tint);display:flex;align-items:center;justify-content:center;padding:0;aspect-ratio:320/190;height:auto;overflow:hidden\">\n          <div id=\"viz3-lottie\" style=\"width:78%;height:78%\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"k\">01 · FOR THE CURIOUS<\u002Fspan>\n        <h2>Be first to what's next<\u002Fh2>\n        <p class=\"tdesc\">Internet is chapter one. The next markets are already on our map, sealed until launch, and founding members hear it before a word goes public.<\u002Fp>\n      <\u002Fsection>\n\n      <section class=\"tcard\" id=\"p2\">\n        <div class=\"pviz\" style=\"background:var(--green-tint);display:flex;align-items:center;justify-content:center;padding:0;aspect-ratio:320/190;height:auto;overflow:hidden\">\n          <div id=\"viz2-lottie\" style=\"width:78%;height:78%\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"k\">02 · FOR THE BELIEVERS<\u002Fspan>\n        <h2>Let's make pricing honest, together<\u002Fh2>\n        <p class=\"tdesc\">Honest pricing isn't a favour providers grant. It's what happens when enough households ask the same question at the same time.<\u002Fp>\n      <\u002Fsection>\n\n      <section class=\"tcard\" id=\"p1\">\n        <div class=\"pviz\" style=\"background:var(--green-tint);display:flex;align-items:center;justify-content:center;padding:0;aspect-ratio:320/190;height:auto;overflow:hidden\">\n          <video id=\"neural-vid\" src=\"81c852f6-5ed4-4a1d-b38a-f909e9e3b7de\" autoplay=\"autoplay\" loop=\"loop\" playsinline=\"playsinline\" style=\"width:100%;height:100%;display:block;object-fit:cover;mix-blend-mode:multiply;filter:sepia(1) saturate(2.6) hue-rotate(108deg) brightness(1.1) contrast(1)\"><\u002Fvideo>\n        <\u002Fdiv>\n        <span class=\"k\">03 · FOR THE SAVERS<\u002Fspan>\n        <h2>New connection or a lower bill<\u002Fh2>\n        <p class=\"tdesc\">Setting up a new place, or done overpaying at the old one? Either way, providers bid for your street and the group price is yours to take.<\u002Fp>\n      <\u002Fsection>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"sect sect--mist\">\n  <div class=\"wrap\">\n    <div class=\"shead\">\n      <span class=\"whl-eyebrow\">Stay tuned<\u002Fspan>\n      <h2>You'll always hear it first<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"stay3\">\n      <div class=\"s3card\"><div class=\"s3head\"><span class=\"ntile\"><svg sc-camel-view-box=\"0 0 24 24\"><path d=\"M4 11a9 9 0 0 1 9 9M4 4a16 16 0 0 1 16 16\"><\u002Fpath><circle cx=\"5\" cy=\"19\" r=\"1.6\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fspan><b>Launches &amp; updates<\u002Fb><\u002Fdiv><p>New markets, new tools. Founding members hear it first, region by region.<\u002Fp><\u002Fdiv>\n      <div class=\"s3card\"><div class=\"s3head\"><span class=\"ntile\"><svg sc-camel-view-box=\"0 0 24 24\"><path d=\"M12 3 3 8l9 5 9-5-9-5Z\"><\u002Fpath><path d=\"M7 10.5V17c0 1.6 2.2 3 5 3s5-1.4 5-3v-6.5\"><\u002Fpath><\u002Fsvg><\u002Fspan><b>Regulator &amp; market watch<\u002Fb><\u002Fdiv><p>CRTC rulings, price moves and competitor plays, decoded in plain language.<\u002Fp><\u002Fdiv>\n      <div class=\"s3card\"><div class=\"s3head\"><span class=\"ntile\"><svg sc-camel-view-box=\"0 0 24 24\"><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14Z\"><\u002Fpath><path d=\"M9 8h7M9 11.5h5\"><\u002Fpath><\u002Fsvg><\u002Fspan><b>Guides that take you forward<\u002Fb><\u002Fdiv><p>Reading a bill, timing a switch, knowing your rights. Our writing, minus the jargon.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"sect\">\n  <div class=\"wrap\">\n    <div class=\"shead\">\n      <span class=\"whl-eyebrow\">FAQ<\u002Fspan>\n      <h2>Questions, answered<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faqwrap\">\n      <div class=\"qa open\">\n        <button type=\"button\"><b>What happens after I join?<\u002Fb><span class=\"pm\"><svg sc-camel-view-box=\"0 0 24 24\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n        <div class=\"ans\">When enough neighbours are in, your area's cohort opens and providers bid for the whole group. You'll see the winning offer in plain numbers. Say yes only if it's better than what you have.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"qa\">\n        <button type=\"button\"><b>Am I committing to switch?<\u002Fb><span class=\"pm\"><svg sc-camel-view-box=\"0 0 24 24\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n        <div class=\"ans\">No. Joining holds a spot and adds weight to your area's cohort. Whatever offer comes back, the decision stays with you.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"qa\">\n        <button type=\"button\"><b>What about my current contract?<\u002Fb><span class=\"pm\"><svg sc-camel-view-box=\"0 0 24 24\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n        <div class=\"ans\">Since June 12, 2026, providers can't charge activation, change or cancellation fees on internet plans (CRTC 2026‑43). Cohorts are also timed to renewal windows, so most members move when their promo was ending anyway.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"qa\">\n        <button type=\"button\"><b>When does my area open?<\u002Fb><span class=\"pm\"><svg sc-camel-view-box=\"0 0 24 24\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fbutton>\n        <div class=\"ans\">Regions open in order of demand. Your postal code puts you in line, and every neighbour who joins moves your area up.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"whl-foot\">\n  <div class=\"wrap\"><b style=\"font-family:var(--disp);color:var(--teal)\">Whollar<\u002Fb> · Design mock v6, for review. CRTC 2026‑43 in force June 12, 2026. Share link is a placeholder pending domain wiring.<\u002Fdiv>\n<\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    const root = this.base || document;\n    const $ = s => root.querySelector(s);\n    const $$ = s => [...root.querySelectorAll(s)];\n    const FSA={A:'Newfoundland & Labrador',B:'Nova Scotia',C:'PEI',E:'New Brunswick',G:'Quebec',H:'Quebec',J:'Quebec',K:'Ontario',L:'Ontario',M:'Ontario',N:'Ontario',P:'Ontario',R:'Manitoba',S:'Saskatchewan',T:'Alberta',V:'British Columbia',X:'the North',Y:'Yukon'};\n    const S={name:'',last:'',email:'',phone:'',fsa:null};\n\n    if($('#viz2-lottie')&&window.lottie){window.lottie.loadAnimation({container:$('#viz2-lottie'),renderer:'svg',loop:true,autoplay:true,path:(window.__resources&&window.__resources.walletLottie)||'./flying-wallet-money.json'});}\n    if($('#viz3-lottie')&&window.lottie){window.lottie.loadAnimation({container:$('#viz3-lottie'),renderer:'svg',loop:true,autoplay:true,path:(window.__resources&&window.__resources.searchLottie)||'./search.json'});}\n\n    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target);}}),{threshold:.12});\n    $$('.tcard,.s3card,.faqwrap').forEach(p=>io.observe(p));\n\n    const q=new URLSearchParams(location.search);\n    if(q.get('email')&&$('#j-email'))$('#j-email').value=q.get('email');\n    if(q.get('fsa')&&$('#j-pc'))$('#j-pc').value=q.get('fsa');\n\n    function parsePC(){const el=$('#j-pc');const v=el.value.toUpperCase();el.value=v;\n      const m=v.replace(/\\s/g,'').match(/^([A-Z])\\d[A-Z]/);\n      if(m&&FSA[m[1]]){S.fsa=v.replace(/\\s/g,'').slice(0,3);\n        $('#j-okc').textContent='\\u2713 '+FSA[m[1]]+' \\u00b7 the '+S.fsa+' cohort';$('#j-okc').classList.add('on');}\n      else{S.fsa=null;$('#j-okc').classList.remove('on');}}\n    if($('#j-pc')){$('#j-pc').addEventListener('input',parsePC);if($('#j-pc').value)parsePC();}\n\n    $('#ref-toggle').addEventListener('click',()=>{const r=$('#refbox');const show=r.style.display==='none';r.style.display=show?'block':'none';if(show)$('#j-ref').focus();});\n\n    $('#j-go').addEventListener('click',()=>{\n      const nm=$('#j-name').value.trim();\n      if(nm.length<2){$('#j-name').classList.add('err');$('#j-name').focus();return;}\n      $('#j-name').classList.remove('err');\n      const ln=$('#j-last').value.trim();\n      if(ln.length<2){$('#j-last').classList.add('err');$('#j-last').focus();return;}\n      $('#j-last').classList.remove('err');\n      const em=$('#j-email').value.trim();\n      if(!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]{2,}$/.test(em)){$('#j-email').classList.add('err');$('#j-email').focus();return;}\n      $('#j-email').classList.remove('err');\n      const ph=$('#j-phone').value.replace(/\\D/g,'');\n      if(ph.length<10||ph.length>11){$('#j-phone').classList.add('err');$('#j-phone').focus();return;}\n      $('#j-phone').classList.remove('err');\n      if(!S.fsa){$('#j-pc').classList.add('err');$('#j-pc').focus();return;}\n      $('#j-pc').classList.remove('err');\n      S.name=nm;S.last=ln;S.email=em;S.phone=ph;\n      /* WIRE-UP POINT: POST founding-member signup {name, email, phone, fsa, referral} here */\n      console.log('[whollar-join placeholder]',{firstName:S.name,lastName:S.last,email:S.email,phone:S.phone,fsa:S.fsa,referral:$('#j-ref').value.trim()||null,ts:new Date().toISOString()});\n      $('#done-h').textContent=nm+\", you're in.\";\n      $('#done-p').textContent='Your spot in the '+S.fsa+' cohort is held. We\\u2019ll text the moment bids land.';\n      $('#sh-lnk').textContent='whollar.ca/join?fsa='+S.fsa;\n      $('#sh-p').textContent='Share your link. Every neighbour in '+S.fsa+' who joins through you strengthens the bid you\\u2019ll all get.';\n      $('#joinform').style.display='none';\n      $('#joindone').classList.add('on');\n    });\n\n    $('#sh-cp').addEventListener('click',()=>{\n      const t='https://'+$('#sh-lnk').textContent;\n      const done=()=>{$('#sh-cp').textContent='Copied';setTimeout(()=>$('#sh-cp').textContent='Copy',1600);};\n      if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).then(done,done);else done();});\n\n    (function(){\n      const g=$('#v1-houses');if(!g)return;\n      const HOUSE='M0 8 L9 0 L18 8 V18 H0 Z';\n      const HX=[96,168,240];\n      g.innerHTML=HX.map(x=>'<g class=\"hs\" transform=\"translate('+(x-9)+',128)\"><path d=\"'+HOUSE+'\" fill=\"#E4F4EC\" stroke=\"#1C9C82\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/><rect x=\"7\" y=\"11\" width=\"4.5\" height=\"7\" fill=\"#1C9C82\"/><\u002Fg>').join('');\n      const path=$('#v1path'),knob=$('#v1knob'),ring=$('#v1ring'),link=$('#v1link'),\n            tag=$('#v1-tag'),tagbg=$('#v1tagbg'),houses=$$('#v1-houses .hs'),\n            rows=$$('#viz2 .v2row');\n      const L=path.getTotalLength();\n      path.style.strokeDasharray=L;\n      const ease=x=>x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;\n      function setTag(dn){\n        if(dn){tag.textContent='together';tag.setAttribute('fill','#178A5A');tagbg.setAttribute('fill','#E4F4EC');tagbg.setAttribute('width','78');tag.setAttribute('x','59');}\n        else{tag.textContent='alone';tag.setAttribute('fill','#C2643B');tagbg.setAttribute('fill','#F7E7DD');tagbg.setAttribute('width','60');tag.setAttribute('x','50');}}\n      function reset(){\n        path.style.strokeDashoffset=L;\n        knob.setAttribute('cx',24);knob.setAttribute('cy',44);\n        houses.forEach(h=>h.classList.remove('on'));\n        link.classList.remove('on');ring.classList.remove('on');ring.setAttribute('opacity','0');\n        rows.forEach(r=>r.classList.remove('on'));\n        setTag(false);}\n      function finale(){\n        link.classList.add('on');\n        const pt=path.getPointAtLength(L);\n        ring.setAttribute('cx',pt.x);ring.setAttribute('cy',pt.y);ring.setAttribute('opacity','1');ring.classList.add('on');\n        setTag(true);}\n      function run(){\n        reset();\n        const t0=performance.now(),D=4300;\n        rows.forEach((r,i)=>setTimeout(()=>r.classList.add('on'),1100+i*900));\n        requestAnimationFrame(function fr(now){\n          const p=Math.min(1,(now-t0)/D),e=ease(p);\n          path.style.strokeDashoffset=L*(1-e);\n          const pt=path.getPointAtLength(L*e);\n          knob.setAttribute('cx',pt.x);knob.setAttribute('cy',pt.y);\n          houses.forEach((h,i)=>{if(pt.x>=HX[i]-2&&pt.y>=60&&!h.classList.contains('on'))h.classList.add('on');});\n          if(p<1)requestAnimationFrame(fr);else finale();});\n        setTimeout(run,8200);}\n      if(matchMedia('(prefers-reduced-motion: reduce)').matches){\n        path.style.strokeDashoffset=0;houses.forEach(h=>h.classList.add('on'));\n        const pt=path.getPointAtLength(L);knob.setAttribute('cx',pt.x);knob.setAttribute('cy',pt.y);\n        link.classList.add('on');setTag(true);\n        rows.forEach(r=>r.classList.add('on'));}\n      else run();\n    })();\n\n    $$('.qa>button').forEach(b=>b.addEventListener('click',()=>b.closest('.qa').classList.toggle('open')));\n\n    const vid=$('#whatnext-vid');\n    if(vid){\n      vid.muted=true;vid.loop=true;vid.playsInline=true;\n      const tryPlay=()=>vid.play().catch(()=>{});\n      tryPlay();\n      vid.addEventListener('loadeddata',tryPlay);\n    }\n\n    (function(){\n      const cv=$('#hs-net');if(!cv)return;\n      const ctx=cv.getContext('2d');\n      const host=cv.parentElement;\n      const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;\n      let W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2),nodes=[],raf=0;\n      function build(){\n        const r=host.getBoundingClientRect();\n        W=Math.max(1,r.width);H=Math.max(1,r.height);\n        cv.width=W*dpr;cv.height=H*dpr;\n        ctx.setTransform(dpr,0,0,dpr,0,0);\n        const count=Math.max(14,Math.round(W*H/26000));\n        nodes=Array.from({length:count},()=>({\n          x:Math.random()*W,y:Math.random()*H,\n          vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,\n          r:Math.random()*2.4+1.4,\n          glow:Math.random()<.28\n        }));\n      }\n      const LINK=150;\n      function frame(){\n        ctx.clearRect(0,0,W,H);\n        for(const n of nodes){\n          n.x+=n.vx;n.y+=n.vy;\n          if(n.x<-20)n.x=W+20;if(n.x>W+20)n.x=-20;\n          if(n.y<-20)n.y=H+20;if(n.y>H+20)n.y=-20;\n        }\n        for(let i=0;i<nodes.length;i++){\n          for(let j=i+1;j<nodes.length;j++){\n            const a=nodes[i],b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);\n            if(d<LINK){\n              ctx.strokeStyle='rgba(127,227,176,'+(0.16*(1-d/LINK)).toFixed(3)+')';\n              ctx.lineWidth=1;\n              ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();\n            }\n          }\n        }\n        for(const n of nodes){\n          if(n.glow){\n            const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*6);\n            g.addColorStop(0,'rgba(127,227,176,.5)');g.addColorStop(1,'rgba(127,227,176,0)');\n            ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r*6,0,6.283);ctx.fill();\n          }\n          ctx.fillStyle=n.glow?'#7FE3B0':'rgba(127,227,176,.55)';\n          ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,6.283);ctx.fill();\n        }\n        raf=requestAnimationFrame(frame);\n      }\n      build();\n      if(reduce){frame();cancelAnimationFrame(raf);}\n      else raf=requestAnimationFrame(frame);\n      const ro=new ResizeObserver(()=>{build();if(reduce){cancelAnimationFrame(raf);frame();cancelAnimationFrame(raf);}});\n      ro.observe(host);\n    })();\n  }\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
